# tcp_splice policy, applied at boot by tcp-splice.service (via tcp-splice-start).
# After editing, re-apply with:  systemctl restart tcp-splice

# cgroup-v2 directory to attach the sock_ops program to. The program runs for
# sockets in this cgroup and all descendants, so the v2 root covers everything.
CGROUP=/sys/fs/cgroup

# Only splice loopback flows (127.0.0.0/8, ::1).  1 = yes, 0 = no (also splice
# routable same-host flows, e.g. container veth IPs).
LOOPBACK_ONLY=1

# Restrict to flows where either endpoint uses one of these ports (comma list);
# blank = any port. Example for an Istio sidecar:  PORTS=15001,15006
PORTS=

# Ring busy-poll budget in microseconds (writes net.core.busy_read). Collapses
# the per-request wakeup cost for latency-bound RR traffic. 0 or blank = off.
BUSY_POLL_US=50

# Per-direction ring size in KiB (blank = module default, 64). Larger only lets a
# fast sender run further ahead before blocking; it does not change the bypass.
RING_KBYTES=
